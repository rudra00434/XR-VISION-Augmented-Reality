<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AERO-G1 Preview</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #preview-scene {
            width: 100%;
            height: 100%;
        }

        #preview-scene canvas {
            background: transparent !important;
        }
    </style>
</head>

<body>
    <a-scene id="preview-scene" embedded background="transparent: true" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="antialias: true; alpha: true; colorManagement: true; exposure: 1.5">
        <a-assets>
            <a-asset-item id="preview-helmet-asset"
                src="https://modelviewer.dev/shared-assets/models/glTF-Sample-Assets/Models/DamagedHelmet/glTF-Binary/DamagedHelmet.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" color="#aaccff" intensity="0.65"></a-light>
        <a-light type="point" color="#00dcff" intensity="2.5" position="2 3 2"></a-light>
        <a-light type="point" color="#ff6b2b" intensity="0.8" position="-2 -1 1"></a-light>

        <a-entity id="preview-helmet" gltf-model="#preview-helmet-asset" scale="1.1 1.1 1.1" position="0 0 -2">
        </a-entity>
        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const previewHelmet = document.getElementById('preview-helmet');
        let previewReady = false;

        previewHelmet.addEventListener('model-loaded', () => {
            previewReady = true;
            window.parent.postMessage({ type: 'preview-ready' }, '*');
        });

        function animatePreview(time) {
            if (previewReady && previewHelmet.object3D) {
                previewHelmet.object3D.rotation.y = time * 0.00045;
                previewHelmet.object3D.position.y = Math.sin(time * 0.002) * 0.05;
            }
            requestAnimationFrame(animatePreview);
        }

        requestAnimationFrame(animatePreview);
    </script>
</body>

</html>
